<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Tiles — bento surfaces</div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px;">
    <div style="background:var(--paper-light); border:1px solid var(--rule); border-radius:14px; padding:16px; height:130px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="meta">default</span>
      <div style="font-family:var(--font-display); font-size:26px; font-weight:600; line-height:1; letter-spacing:-.02em;">Paper tile.</div>
    </div>
    <div style="background:var(--ink); color:var(--paper); border-radius:14px; padding:16px; height:130px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--paper-3); letter-spacing:.14em; text-transform:uppercase;">ink</span>
      <div style="font-family:var(--font-display); font-size:26px; font-weight:600; line-height:1; letter-spacing:-.02em;">High contrast.</div>
    </div>
    <div style="background:#F2D78A; border:1px solid var(--ink); border-radius:14px; padding:16px; height:130px; display:flex; flex-direction:column; justify-content:space-between; transform:rotate(-1.4deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);">
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-2); letter-spacing:.14em; text-transform:uppercase;">sticker</span>
      <div style="font-family:var(--font-display); font-size:24px; font-weight:600; line-height:1; letter-spacing:-.02em;">Highlighted.</div>
    </div>
  </div>
</div></body></html>
