<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.field { display:flex; flex-direction:column; gap:6px; }
.field > label { font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); }
.field input, .field textarea { font-family:var(--font-serif); font-size:16px; padding:10px 12px; border:none; border-bottom:1px solid var(--ink); background:transparent; color:var(--ink); outline:none; }
.field input:focus { border-bottom-color:var(--accent); }
.field--boxed input { border:1px solid var(--ink); background:var(--paper-light); border-radius:8px; }
.check { display:flex; gap:10px; align-items:center; font-family:var(--font-serif); font-size:16px; }
.check::before { content:''; width:18px; height:18px; border:1.5px solid var(--ink); border-radius:3px; background:var(--paper-light); }
.check--on::before { background:var(--accent); border-color:var(--accent-ink); }
</style>
</head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Inputs</div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px 24px;">
    <div class="field">
      <label>your name</label>
      <input value="Aarya"/>
    </div>
    <div class="field field--boxed">
      <label>email</label>
      <input placeholder="hello@..."/>
    </div>
    <div style="display:flex; gap:18px; align-items:center;">
      <span class="check check--on">Subscribe to essays</span>
      <span class="check">Send me drafts</span>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span style="font-family:var(--font-mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3)">filter</span>
      <span style="display:inline-block; padding:4px 12px; font-family:var(--font-mono); font-size:12px; border:1px solid var(--ink); border-radius:999px; background:var(--ink); color:var(--paper);">research</span>
      <span style="display:inline-block; padding:4px 12px; font-family:var(--font-mono); font-size:12px; border:1px solid var(--ink); border-radius:999px;">essays</span>
      <span style="display:inline-block; padding:4px 12px; font-family:var(--font-mono); font-size:12px; border:1px solid var(--ink); border-radius:999px;">code</span>
    </div>
  </div>
</div></body></html>
