<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.btn { font-family: var(--font-display); font-weight:500; font-size:15px; padding:10px 18px; border-radius:8px; border:2px solid var(--ink); background:var(--paper-light); color:var(--ink); cursor:pointer; transition:all .18s var(--ease-out); display:inline-flex; align-items:center; gap:8px; }
.btn--primary { background:var(--ink); color:var(--paper); }
.btn--accent { background:var(--accent); border-color:var(--accent-ink); color:var(--accent-ink); }
.btn--ghost { background:transparent; border-color:transparent; padding-left:0; padding-right:0; text-decoration:underline; text-underline-offset:4px; }
.btn--sm { font-size:13px; padding:6px 12px; }
.btn:hover { box-shadow:3px 4px 0 var(--ink); transform:translate(-2px,-2px); }
.btn--accent:hover { box-shadow:3px 4px 0 var(--accent-ink); }
</style>
</head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Buttons</div>
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">
    <button class="btn btn--primary">Read paper →</button>
    <button class="btn">View on GitHub</button>
    <button class="btn btn--accent">Hire me</button>
    <button class="btn btn--ghost">cancel</button>
    <button class="btn btn--sm">+ filter</button>
  </div>
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:14px;">
    <button class="btn btn--primary" style="box-shadow:3px 4px 0 var(--ink); transform:translate(-2px,-2px)">Hover</button>
    <button class="btn btn--primary" style="box-shadow:inset 0 2px 0 rgba(255,255,255,.1); transform:translate(0,0)">Press</button>
    <button class="btn" disabled style="opacity:.45; cursor:not-allowed;">Disabled</button>
  </div>
</div></body></html>
