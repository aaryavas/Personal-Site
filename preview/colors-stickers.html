<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Sticker pastels — highlights only, never fills</div>
  <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:12px;">
    <div>
      <div style="height:64px; background:#F2D78A; border:1px solid var(--ink); border-radius:6px; transform:rotate(-2deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);"></div>
      <div class="meta" style="margin-top:10px;">butter</div>
    </div>
    <div>
      <div style="height:64px; background:#B8D4B2; border:1px solid var(--ink); border-radius:6px; transform:rotate(1.5deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);"></div>
      <div class="meta" style="margin-top:10px;">mint</div>
    </div>
    <div>
      <div style="height:64px; background:#C7BCDB; border:1px solid var(--ink); border-radius:6px; transform:rotate(-1deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);"></div>
      <div class="meta" style="margin-top:10px;">lilac</div>
    </div>
    <div>
      <div style="height:64px; background:#B5CCDE; border:1px solid var(--ink); border-radius:6px; transform:rotate(2deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);"></div>
      <div class="meta" style="margin-top:10px;">sky</div>
    </div>
    <div>
      <div style="height:64px; background:#E8B5B5; border:1px solid var(--ink); border-radius:6px; transform:rotate(-2.5deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);"></div>
      <div class="meta" style="margin-top:10px;">rose</div>
    </div>
  </div>
</div></body></html>
