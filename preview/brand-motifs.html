<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .specimen {
    position:relative;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 22% 30%, rgba(26,24,20,.025) 0 1px, transparent 1.5px),
      radial-gradient(circle at 68% 78%, rgba(26,24,20,.022) 0 1px, transparent 1.5px);
    background-size: 9px 9px, 15px 15px;
    border:1px solid var(--rule); border-radius:14px; height:180px; overflow:hidden;
  }
  .float { position:absolute; }
</style>
</head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Motifs in concert — paper, sticker, annotation, math ornament</div>
  <div class="specimen">
    <span class="float" style="top:18px; left:24px; font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3);">scratchpad · 2025</span>

    <div class="float" style="top:50px; left:24px; font-family:'Literata',serif; font-style:italic; font-size:42px; line-height:.95; color:var(--ink); letter-spacing:-.015em; font-feature-settings:'ss01' on;">
      ∂ℒ/∂θ <span style="font-style:normal;">= 0</span>
    </div>

    <span class="float" style="top:74px; left:330px; padding:3px 10px; font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; background:#F2D78A; color:var(--ink); border:1px solid var(--ink); border-radius:999px; transform:rotate(-5deg); box-shadow:2px 3px 0 rgba(26,24,20,.18);">
      converges :)
    </span>

    <svg class="float" style="top:108px; left:226px; color:#1A3E66; transform:rotate(-12deg);" viewBox="0 0 100 60" width="80" height="48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 6 8 C 30 8, 56 10, 78 36"/><path d="M 70 28 L 80 38 L 70 44"/>
    </svg>

    <span class="float" style="bottom:18px; left:24px; font-family:'Caveat',cursive; font-size:30px; color:#1A3E66; transform:rotate(-3deg);">
      finally
    </span>

    <span class="float" style="bottom:20px; right:24px; padding:6px 14px; font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#1A3E66; border:2px solid #1A3E66; border-radius:2px; transform:rotate(6deg); opacity:.85;">
      first place
    </span>
  </div>
</div></body></html>
