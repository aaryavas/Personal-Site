<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>

.tag--accent { background:var(--accent-wash); border-color:var(--accent-ink); color:var(--accent-ink); }

</style>
</head>

  <div class="eyebrow" style="margin-bottom:14px">Tags · chips · meta</div>

    <span class="tag">PyTorch</span>
    <span class="tag">Agentic</span>

    <span class="tag tag--dot" style="color:#1A3E66;">published</span>
  </div>
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:14px; font-family:var(--font-mono); font-size:12px; color:var(--ink-3); letter-spacing:.06em;">
    <span>2025 · 04</span><span>·</span><span>8 min read</span><span>·</span><span>v0.3.1</span><span>·</span><span>NeurIPS '25</span>
