<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Stickers & stamps</div>
  <div style="display:flex; gap:22px; flex-wrap:wrap; align-items:center;">
    <span style="display:inline-block; padding:3px 12px; font-family:var(--font-mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase; background:#F2D78A; color:var(--ink); border:1px solid var(--ink); border-radius:999px; box-shadow:2px 3px 0 rgba(26,24,20,.18); transform:rotate(-3deg);">recently published</span>
    <span style="display:inline-block; padding:3px 12px; font-family:var(--font-mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase; background:#B8D4B2; color:var(--ink); border:1px solid var(--ink); border-radius:999px; box-shadow:2px 3px 0 rgba(26,24,20,.18); transform:rotate(2deg);">in progress</span>
    <span style="display:inline-block; padding:3px 12px; font-family:var(--font-mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase; background:#C7BCDB; color:var(--ink); border:1px solid var(--ink); border-radius:999px; box-shadow:2px 3px 0 rgba(26,24,20,.18); transform:rotate(-1deg);">thinking about</span>
    <span style="display:inline-block; padding:6px 14px; font-family:var(--font-mono); font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:#1A3E66; border:2px solid #1A3E66; border-radius:2px; transform:rotate(-6deg); opacity:.85;">first place</span>
    <span style="display:inline-block; padding:6px 14px; font-family:var(--font-mono); font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink); border:2px solid var(--ink); border-radius:2px; transform:rotate(4deg); opacity:.7;">draft v3</span>
  </div>
</div></body></html>
