<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:18px">Shadows & borders — flat, paper-aware</div>
  <div style="display:flex; align-items:center; gap:24px; flex-wrap:wrap;">
    <div style="text-align:center;">
      <div style="width:120px; height:80px; background:#F8F4EA; border:1px solid var(--rule); border-radius:14px;"></div>
      <div class="meta" style="margin-top:14px;">tile · rest</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px; height:80px; background:#F8F4EA; border:1px solid var(--ink); border-radius:14px; box-shadow:2px 3px 0 rgba(26,24,20,.18);"></div>
      <div class="meta" style="margin-top:14px;">shadow-sticker</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px; height:80px; background:#F8F4EA; border:1px solid var(--ink); border-radius:14px; box-shadow:3px 4px 0 var(--ink); transform:translate(-2px,-2px);"></div>
      <div class="meta" style="margin-top:14px;">shadow-hover</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px; height:80px; background:#EBE3D0; border:1px solid var(--rule); border-radius:14px; box-shadow:inset 0 2px 0 rgba(26,24,20,.08);"></div>
      <div class="meta" style="margin-top:14px;">shadow-press</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px; height:80px; background:#F8F4EA; border:2px solid var(--ink); border-radius:14px;"></div>
      <div class="meta" style="margin-top:14px;">border-thick · 2px</div>
    </div>
  </div>
</div></body></html>
