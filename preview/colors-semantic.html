<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Semantic tokens</div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px;">
    <div style="background:var(--paper); border:1px solid var(--rule); border-radius:8px; padding:14px;">
      <div style="font-family:var(--font-display); font-size:28px; color:var(--ink); line-height:1;">Aa</div>
      <div class="meta" style="margin-top:8px;">--bg / --fg</div>
    </div>
    <div style="background:var(--paper-light); border:1px solid var(--rule); border-radius:8px; padding:14px;">
      <div style="font-family:var(--font-display); font-size:28px; color:var(--ink); line-height:1;">Aa</div>
      <div class="meta" style="margin-top:8px;">--surface / --fg</div>
    </div>
    <div style="background:var(--ink); border-radius:8px; padding:14px;">
      <div style="font-family:var(--font-display); font-size:28px; color:var(--paper); line-height:1;">Aa</div>
      <div style="font-family:var(--font-mono); font-size:12px; color:var(--paper-3); margin-top:8px; text-transform:uppercase; letter-spacing:.14em;">tile--ink</div>
    </div>
    <div style="background:var(--accent); border-radius:8px; padding:14px;">
      <div style="font-family:var(--font-display); font-size:28px; color:#1A3E66; line-height:1;">Aa</div>
      <div style="font-family:var(--font-mono); font-size:12px; color:#1A3E66; margin-top:8px; text-transform:uppercase; letter-spacing:.14em;">--accent</div>
    </div>
    <div style="background:var(--paper); border:1px solid var(--rule); border-radius:8px; padding:14px;">
      <a href="#" style="font-family:var(--font-serif); font-size:18px; color:var(--ink);">a link →</a>
      <div class="meta" style="margin-top:8px;">--link</div>
    </div>
    <div style="background:var(--paper); border:1px solid var(--rule); border-radius:8px; padding:14px;">
      <span style="background:#D6E3F0; color:#1A3E66; padding:2px 8px; border-radius:3px;">selection</span>
      <div class="meta" style="margin-top:8px;">::selection</div>
    </div>
  </div>
</div></body></html>
