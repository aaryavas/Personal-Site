<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aarya Vasantlal — portfolio</title>
  <link rel="stylesheet" href="portfolio.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/monogram.svg" />
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel (pinned per system rules) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components, then surfaces, then app -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="projects.jsx"></script>
  <script type="text/babel" src="research.jsx"></script>
  <script type="text/babel" src="blog.jsx"></script>
  <script type="text/babel" src="now.jsx"></script>
  <script type="text/babel" src="contact.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;

    function App() {
      const hash = window.useHash();

      // Scroll to top on route change
      useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [hash]);

      // route parsing
      let view;
      if (hash === '#/' || hash === '' || hash === '#') view = <window.Home />;
      else if (hash === '#/projects') view = <window.ProjectsIndex />;
      else if (hash.startsWith('#/projects/')) {
        const id = hash.split('/')[2];
        view = <window.ProjectDetail id={id} />;
      }
      else if (hash === '#/research') view = <window.Research />;
      else if (hash === '#/blog') view = <window.BlogIndex />;
      else if (hash.startsWith('#/blog/')) {
        const slug = hash.split('/')[2];
        view = <window.BlogPost slug={slug} />;
      }
      else if (hash === '#/now') view = <window.Now />;
      else if (hash === '#/contact') view = <window.Contact />;
      else view = (
        <section style={{ paddingTop: 64 }}>
          <div className="meta">404</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize: 56 }}>Nothing here.</h1>
          <window.Btn href="#/">← back home</window.Btn>
        </section>
      );

      return (
        <div className="app">
          <window.TopNav />
          <main key={hash} className="fadeup">{view}</main>
          <window.Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
